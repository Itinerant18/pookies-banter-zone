name: Daily AI Tools Update

on:
  schedule:
    # Run at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  update-tools:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx python-dotenv

      - name: Run Auto-Update Script
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          PRODUCT_HUNT_API_KEY: ${{ secrets.PRODUCT_HUNT_API_KEY }}
          PRODUCT_HUNT_API_SECRET: ${{ secrets.PRODUCT_HUNT_API_SECRET }}
          PRODUCT_HUNT_ACCESS_TOKEN: ${{ secrets.PRODUCT_HUNT_ACCESS_TOKEN }}
        run: |
          python backend/auto_update/run_daily.py --run-now

      - name: Update tools-data.json
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
        run: |
          # Fetch the latest tools from Convex to keep tools-data.json in sync
          # This assumes there is an endpoint to fetch all tools as JSON
          curl -X POST "$CONVEX_URL/api/run/tools/get" \
            -H "Content-Type: application/json" \
            -d '{"args": {}, "format": "json"}' > tools-data.json

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tools-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: daily update AI tools data [skip ci]"
          git push
