name: pookie_banter_zone_mobile
description: "Pookie's Banter Zone - A real-time chat application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0

  # State Management
  provider: ^6.1.0

  # Navigation
  go_router: ^14.8.0

  # UI Components
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0

  # Image Picker
  image_picker: ^1.1.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.5.0
  google_sign_in: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
